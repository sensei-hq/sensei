<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" data-style="rokkit" data-density="comfortable">
    <script>
      // Set dark/light from system preference immediately (before first paint)
      (function () {
        var dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.body.dataset.mode = dark ? 'dark' : 'light';
      })()
    </script>
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
