project:
  name: sensei
  database: PostgreSQL
  extensionSchema: extensions
  staging:
    - staging

external:
  - name: auth.users
    note: Supabase built-in authentication table
    columns:
      - id: uuid
  - name: auth.identities
    note: Supabase built-in identity table
    columns:
      - id: uuid
      - user_id: uuid

supabase:
  - core
  - sensei
  - platform

schemas:
  - extensions
  - public
  - staging
  - core
  - sensei
  - platform

extensions:
  - uuid-ossp
  - vector

import:
  options:
    truncate: true
    nullValue: ""
  after:
    - import/loader.sql
