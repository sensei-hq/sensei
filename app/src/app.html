<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <script>
            // Boot-timing baseline — captured at HTML parse time (earliest the
            // webview can run JS). Other code reads window.__SENSEI_T0__ and
            // logs `boot:<phase>` deltas. Remove once boot loader is shipped.
            window.__SENSEI_T0__ = performance.now();
            console.log(
                "[boot:html-parsed]",
                "+0.0ms",
                "(timestamp=" + new Date().toISOString() + ")",
            );
            window.__senseiMark = function (label) {
                var dt = (
                    performance.now() - window.__SENSEI_T0__
                ).toFixed(1);
                console.log("[boot:" + label + "]", "+" + dt + "ms");
            };
        </script>
        %sveltekit.head%
    </head>
    <body
        data-sveltekit-preload-data="hover"
        data-style="zen-sumi"
        data-density="comfortable"
    >
        <script>
            (function () {
                try {
                    var t = JSON.parse(localStorage.getItem("sensei") || "{}");
                    var b = document.body;
                    b.dataset.mode = t.mode || "dark";
                } catch (e) {}
            })();
        </script>
        <script>
            // Set dark/light from system preference immediately (before first paint)
            (function () {
                var dark = window.matchMedia(
                    "(prefers-color-scheme: dark)",
                ).matches;
                document.body.dataset.mode = dark ? "dark" : "light";
            })();
        </script>
        <div style="display: contents">%sveltekit.body%</div>
    </body>
</html>
