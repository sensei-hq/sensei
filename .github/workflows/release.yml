name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0)'
        required: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  build:
    name: Build ${{ matrix.artifact }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-14
            artifact: sensei-cli-macos-arm64
            build_senseid: true
          - target: x86_64-apple-darwin
            os: macos-13
            artifact: sensei-cli-macos-x86_64
            build_senseid: true
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
            artifact: sensei-cli-linux-arm64
            build_senseid: true
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: sensei-cli-linux-x86_64
            build_senseid: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            artifact: sensei-cli-windows-x86_64
            build_senseid: false

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build (Unix, all crates)
        if: matrix.build_senseid && runner.os != 'Windows'
        run: cargo build --release --workspace --target "$BUILD_TARGET"
        env:
          BUILD_TARGET: ${{ matrix.target }}

      - name: Build (Windows, skip senseid)
        if: runner.os == 'Windows'
        run: cargo build --release --workspace --exclude senseid --target "$env:BUILD_TARGET"
        env:
          BUILD_TARGET: ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        env:
          ARTIFACT_NAME: ${{ matrix.artifact }}
          BUILD_TARGET: ${{ matrix.target }}
          INCLUDE_SENSEID: ${{ matrix.build_senseid }}
        run: |
          mkdir -p "$ARTIFACT_NAME"
          TARGET_DIR="target/$BUILD_TARGET/release"

          cp "$TARGET_DIR/sensei" "$ARTIFACT_NAME/"
          cp "$TARGET_DIR/sensei-mcp" "$ARTIFACT_NAME/"
          if [ "$INCLUDE_SENSEID" = "true" ]; then
            cp "$TARGET_DIR/senseid" "$ARTIFACT_NAME/"
          fi

          tar czf "$ARTIFACT_NAME.tar.gz" "$ARTIFACT_NAME"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ARTIFACT_NAME: ${{ matrix.artifact }}
          BUILD_TARGET: ${{ matrix.target }}
        run: |
          New-Item -ItemType Directory -Path $env:ARTIFACT_NAME -Force
          $targetDir = "target/$($env:BUILD_TARGET)/release"

          Copy-Item "$targetDir/sensei.exe"     "$($env:ARTIFACT_NAME)/"
          Copy-Item "$targetDir/sensei-mcp.exe" "$($env:ARTIFACT_NAME)/"

          Compress-Archive -Path "$($env:ARTIFACT_NAME)/*" -DestinationPath "$($env:ARTIFACT_NAME).zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.zip
          if-no-files-found: error

  publish-release:
    name: Publish to sensei-releases
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect archives and compute SHA256
        run: |
          mkdir -p dist
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec cp {} dist/ \;
          cd dist
          sha256sum * > sha256sums.txt
          cat sha256sums.txt

      - name: Determine version tag
        id: version
        env:
          INPUT_TAG: ${{ inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [ -n "$INPUT_TAG" ]; then
            echo "tag=$INPUT_TAG" >> "$GITHUB_OUTPUT"
          else
            echo "tag=$REF_NAME" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release on public repo
        env:
          GH_TOKEN: ${{ secrets.RELEASES_PAT }}
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$VERSION" \
            --repo mizukisu/sensei-releases \
            --title "Sensei $VERSION" \
            --notes-file - \
            dist/* <<'NOTES'
          ## Install

          ```sh
          brew install mizukisu/tap/sensei
          ```

          Or download and extract the archive for your platform, then add the binaries to your PATH.

          See `sha256sums.txt` for checksums.
          NOTES

      - name: Update Homebrew formula SHA256 values
        run: |
          chmod +x .github/scripts/update-homebrew-sha.sh
          .github/scripts/update-homebrew-sha.sh dist/sha256sums.txt

      - name: Commit and push Homebrew changes
        env:
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add homebrew/
          if git diff --cached --quiet; then
            echo "No Homebrew changes to commit"
          else
            git commit -m "chore(homebrew): update SHA256 for $VERSION"
            git push origin HEAD:develop
          fi
