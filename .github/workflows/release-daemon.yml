name: Release Daemon

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-13
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.use-cross
        run: cargo install cross --locked

      - name: Build binaries
        working-directory: daemon
        env:
          BUILD_TARGET: ${{ matrix.target }}
          USE_CROSS: ${{ matrix.use-cross }}
        run: |
          if [ "$USE_CROSS" = "true" ]; then
            cross build --release --target "$BUILD_TARGET"
          else
            cargo build --release --target "$BUILD_TARGET"
          fi

      - name: Package binaries
        working-directory: daemon
        env:
          BUILD_TARGET: ${{ matrix.target }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          STAGING="release-${TAG}-${BUILD_TARGET}"
          mkdir -p "$STAGING"
          for bin in senseid sensei sensei-mcp; do
            SRC="target/${BUILD_TARGET}/release/${bin}"
            [ -f "$SRC" ] && cp "$SRC" "$STAGING/"
          done
          tar czf "${STAGING}.tar.gz" "$STAGING"
          echo "ASSET=${STAGING}.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: daemon/${{ env.ASSET }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/*.tar.gz
