name: E2E Release Verification

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag to test (e.g. v0.1.0)'
        required: true

env:
  RELEASES_REPO: mizukisu/sensei-releases

jobs:
  verify-website:
    name: Verify website
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Check pages are live
        env:
          SITE_URL: ${{ vars.PAGES_URL || 'https://mizukisu.github.io/sensei-site' }}
        run: |
          for path in "" "/setup" "/usage" "/llms.txt"; do
            url="${SITE_URL}${path}"
            status=$(curl -sL -o /dev/null -w "%{http_code}" "$url")
            echo "$url → $status"
            if [ "$status" != "200" ]; then
              echo "FAIL: $url returned $status" >&2
              exit 1
            fi
          done
          echo "All pages OK"

  verify-download:
    name: Verify binaries (${{ matrix.artifact }})
    runs-on: ${{ matrix.os }}
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            artifact: sensei-cli-macos-arm64
            ext: tar.gz
            has_senseid: true
          - os: macos-13
            artifact: sensei-cli-macos-x86_64
            ext: tar.gz
            has_senseid: true
          - os: ubuntu-latest
            artifact: sensei-cli-linux-x86_64
            ext: tar.gz
            has_senseid: true
          - os: windows-latest
            artifact: sensei-cli-windows-x86_64
            ext: zip
            has_senseid: false
    steps:
      - name: Determine version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "tag=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            tag=$(gh release list --repo "$RELEASES_REPO" --limit 1 --json tagName -q '.[0].tagName')
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release archive
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.tag }}
          ARTIFACT: ${{ matrix.artifact }}
          EXT: ${{ matrix.ext }}
        run: |
          gh release download "$VERSION" \
            --repo "$RELEASES_REPO" \
            --pattern "${ARTIFACT}.${EXT}"

      - name: Extract (Unix)
        if: runner.os != 'Windows'
        env:
          ARTIFACT: ${{ matrix.artifact }}
        run: tar xzf "${ARTIFACT}.tar.gz"

      - name: Extract (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          ARTIFACT: ${{ matrix.artifact }}
        run: Expand-Archive -Path "$env:ARTIFACT.zip" -DestinationPath .

      - name: Verify binaries exist
        shell: bash
        env:
          ARTIFACT: ${{ matrix.artifact }}
          HAS_SENSEID: ${{ matrix.has_senseid }}
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            ls "$ARTIFACT/sensei.exe" "$ARTIFACT/sensei-mcp.exe"
          else
            ls "$ARTIFACT/sensei" "$ARTIFACT/sensei-mcp"
            if [ "$HAS_SENSEID" = "true" ]; then
              ls "$ARTIFACT/senseid"
            fi
          fi

      - name: Check CLI version
        shell: bash
        env:
          ARTIFACT: ${{ matrix.artifact }}
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            actual=$("./$ARTIFACT/sensei.exe" --version 2>&1 | head -1)
          else
            chmod +x "$ARTIFACT"/*
            actual=$("./$ARTIFACT/sensei" --version 2>&1 | head -1)
          fi
          expected_version="${VERSION#v}"
          echo "Got: $actual"
          echo "$actual" | grep -q "$expected_version" || { echo "Version mismatch!" >&2; exit 1; }
          echo "Version OK"

  verify-first-scan:
    name: Verify first scan
    runs-on: macos-14
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Determine version
        id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "tag=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          else
            tag=$(gh release list --repo "$RELEASES_REPO" --limit 1 --json tagName -q '.[0].tagName')
            echo "tag=$tag" >> "$GITHUB_OUTPUT"
          fi

      - name: Download and extract
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.tag }}
        run: |
          gh release download "$VERSION" \
            --repo "$RELEASES_REPO" \
            --pattern "sensei-cli-macos-arm64.tar.gz"
          tar xzf sensei-cli-macos-arm64.tar.gz
          chmod +x sensei-cli-macos-arm64/*
          echo "$PWD/sensei-cli-macos-arm64" >> "$GITHUB_PATH"

      - name: Create test project
        run: |
          mkdir -p /tmp/test-project/src
          cat > /tmp/test-project/src/main.ts <<'TS'
          export function hello(name: string): string {
            return `Hello, ${name}!`;
          }
          TS
          cd /tmp/test-project && git init && git add -A && git commit -m "init"

      - name: Start daemon and scan
        run: |
          senseid start
          sleep 2

          for i in $(seq 1 10); do
            if curl -sf http://localhost:7744/health > /dev/null 2>&1; then
              echo "Daemon healthy"
              break
            fi
            echo "Waiting for daemon... ($i)"
            sleep 1
          done

          curl -sf http://localhost:7744/health || { echo "Daemon not healthy" >&2; exit 1; }

          sensei scan /tmp/test-project
          echo "First scan completed successfully"

          senseid stop
