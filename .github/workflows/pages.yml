name: Deploy Website

on:
  push:
    branches: [main]
    paths: ['apps/static/**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build static site
        run: bun run build
        working-directory: apps/static
        env:
          BASE_PATH: /sensei-site

      - name: Deploy to sensei-site repo
        env:
          GH_TOKEN: ${{ secrets.RELEASES_PAT }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          SITE_REPO="https://x-access-token:${GH_TOKEN}@github.com/mizukisu/sensei-site.git"
          git clone "$SITE_REPO" /tmp/sensei-site
          cd /tmp/sensei-site
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Remove old content but keep .git
          find . -maxdepth 1 ! -name '.git' ! -name '.' -exec rm -rf {} +
          # Copy new build output
          cp -r "$GITHUB_WORKSPACE/apps/static/build/"* .
          git add -A
          git diff --cached --quiet || git commit -m "Deploy website from ${COMMIT_SHA:0:7}"
          git push origin main
