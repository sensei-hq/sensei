name: Feature Request
description: Propose a new feature or capability
labels: ["concept:workflow", "depth:build"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to propose new features. Include the problem, proposed solution, and acceptance criteria.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What does this feature do? One paragraph.
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve? Who benefits?
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: How should this work? Include examples if possible.
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: How do we know this is done? List checkboxes.
      value: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - high
        - medium
        - low
    validations:
      required: true
