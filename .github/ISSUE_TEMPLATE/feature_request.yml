name: Feature Request
description: Propose a new skill, command, agent, hook, or enhancement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea for a new marketplace component or an improvement to an existing one? Let us know.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the feature or enhancement you'd like.
      placeholder: Describe the feature.
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What problem does this solve? How would you use it?
      placeholder: Explain the scenario where this would be useful.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any workarounds or alternative approaches you've tried or considered.
    validations:
      required: false
