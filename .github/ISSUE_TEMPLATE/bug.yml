name: Bug Report
description: Report something that's broken
labels: ["concept:quality", "depth:build"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template to report bugs. Include steps to reproduce and expected vs actual behavior.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect?
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to trigger the bug.
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What should have happened?
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What happened instead? Include error messages if any.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, sensei version, Claude Code version
      value: |
        - OS:
        - sensei version:
        - Claude Code version:
