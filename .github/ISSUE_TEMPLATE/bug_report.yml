name: Bug Report
description: Report a bug in senseid, sensei-cli, or sensei-mcp
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the details below.

  - type: dropdown
    id: crate
    attributes:
      label: Affected crate
      options:
        - senseid (daemon)
        - sensei-cli (CLI)
        - sensei-mcp (MCP server)
        - Multiple / Unknown
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the behavior.
      placeholder: |
        1. Run `sensei-cli ...`
        2. Send request to ...
        3. Observe error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What you expected to happen instead.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS and version
      placeholder: "e.g. macOS 15.4 (arm64), Ubuntu 24.04 (x86_64)"
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Daemon / CLI version
      placeholder: "e.g. v0.1.0 or commit hash"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or error output
      description: Paste any relevant log output. This will be rendered as code.
      render: text
    validations:
      required: false
