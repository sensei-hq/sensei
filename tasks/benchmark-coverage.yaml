# Benchmark: doc coverage improvement
# Tests whether Claude uses sensei MCP tools to efficiently fill in llmspec.yaml coverage
# vs. exploring the codebase by reading files manually.
#
# Run: sensei benchmark doctor --source tasks/ --dest results/ --sample 2
version: "1.0"

tasks:
  - id: coverage-01
    category: llmspec-coverage
    prompt: |
      The file .sensei/llmspec.yaml has an empty docs[] section.
      Fill it in: for each doc in docs/design/ and docs/features/,
      add a covers[] list mapping it to the source files it documents.
      Use the sensei tools to understand what each doc covers before writing.
    success_criteria: >
      docs[] section populated with at least 8 entries, each with a non-empty
      covers[] list pointing to real files in packages/. No hallucinated paths.

  - id: coverage-02
    category: llmspec-coverage
    prompt: |
      The .sensei/llmspec.yaml has placeholder values for description,
      entry_points, concepts, and patterns. Fill them in accurately for this repo.
      Use sensei tools to read the codebase rather than loading full source files.
    success_criteria: >
      description is one accurate sentence; entry_points lists the 5 real package
      entry points; at least 3 concepts and 2 patterns filled in correctly.

  - id: coverage-03
    category: orientation
    prompt: |
      Without reading any source files directly, describe:
      1. What packages exist and what each one does
      2. The dependency graph between packages
      3. Where to find the reindexRepo function and what it returns
    success_criteria: >
      Correctly names all 5 packages with roles; correct dep graph
      (shared->tools->mcp/cli); correctly locates reindexRepo in packages/tools/.

  - id: coverage-04
    category: drift-check
    prompt: |
      Check whether docs/design/05-indexing.md is still accurate given the
      current state of the indexing code. Report any drift.
    success_criteria: >
      Uses check_drift or reads the doc and compares to packages/tools/src/tools/reindex.ts;
      correctly identifies whether the doc covers the @sensei/tools package split.
