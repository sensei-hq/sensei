# sensei-benchmark.yaml — httpx synthetic corpus
# Source: Graphify worked/httpx (MIT licensed)
# 6 Python files modeling httpx's architecture with clean layering

name: httpx
description: Synthetic Python HTTP client library (6 files, layered architecture)
language: python
category: library
difficulty: small

source: ./src

expected:
  symbols:
    total: 136
    functions: 8
    classes: 42
    methods: 84
    const: 2
  edges:
    calls: 30
    imports: 6
  communities:
    count: 6
    god_nodes:
      - Client
      - AsyncClient
      - Response
      - Request
      - BaseClient
      - HTTPTransport

surprising_connections:
  - from: DigestAuth
    to: Response
    why: "auth reads HTTP headers from response to parse WWW-Authenticate challenge"
  - from: Client
    to: ConnectionPool
    why: "client manages connection lifecycle through the pool"

expected_insights:
  - "Client and AsyncClient are god nodes — highest degree in the graph"
  - "exceptions.py is a leaf module — no outgoing calls or imports"
  - "DigestAuth crosses into the HTTP models layer (reads Response)"
  - "6 communities: Auth, Models, Transport, Client, Utils, Exceptions"
