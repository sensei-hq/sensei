<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover" data-mode="light" data-style="rokkit" data-density="comfortable">
		<script>
			(function () {
				try {
					var t = JSON.parse(localStorage.getItem('sensei-site-theme') || '{}')
					var b = document.body
					b.dataset.mode = t.mode || 'light'
					if (t.style) b.dataset.style = t.style
					if (t.density) b.dataset.density = t.density
				} catch (e) {}
			})()
		</script>
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
