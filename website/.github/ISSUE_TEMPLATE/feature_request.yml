name: Feature / Content Request
description: Suggest a new feature or content change for the website
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see added or changed?
    validations:
      required: true

  - type: input
    id: page-section
    attributes:
      label: Page / Section
      description: Which page or section does this relate to?
      placeholder: e.g. /docs, homepage hero
    validations:
      required: false

  - type: textarea
    id: why-it-matters
    attributes:
      label: Why it matters
      description: How would this benefit visitors or the project?
    validations:
      required: true
