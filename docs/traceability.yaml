# ─────────────────────────────────────────────────────────────
# Design docs — declares which feature items each component covers
# ─────────────────────────────────────────────────────────────

design:
  pipeline-adapter:
    doc: docs/design/20-pipeline-adapter.md
    title: Pipeline-First Adapter Pattern
    implements:
      - feature: codebase-intelligence
        items: [language-adapters, symbol-extraction, call-graph, incremental-indexing, three-layer-metadata]
      - feature: smart-context-delivery
        items: [context-pack, diff-first-ranking, ast-symbol-slicing, session-dedup, token-budget, relevance-learning]

  cc-rlm-analysis:
    doc: docs/design/cc-rlm.md
    title: CC-RLM Architecture Analysis
    implements: []

  architecture:
    doc: docs/design/architecture.md
    title: Architecture (Current + Future)
    implements: []

  indexer:
    doc: docs/design/05-indexing.md
    title: Indexer
    implements:
      - feature: codebase-intelligence
        items: [repo-scanner, symbol-extraction, semantic-search]

  drift-detector:
    doc: docs/design/07-drift.md
    title: Drift Detector
    implements:
      - feature: documentation-traceability
        items: [drift-detection]

  incremental-indexer:
    doc: docs/design/12-incremental-indexing.md
    title: Incremental Indexer
    implements:
      - feature: codebase-intelligence
        items: [incremental-indexing]

  context-manager:
    doc: docs/design/19-context-manager.md
    title: Context Manager
    implements:
      - feature: smart-context-delivery
        items: [load-context, recommend-next, token-budget]

  analytics-collector:
    doc: docs/superpowers/specs/2026-03-11-analytics-design.md
    title: Analytics Collector
    implements:
      - feature: analytics
        items: [telemetry-collection, analytics-cli-dashboard]

  supabase-store:
    doc: docs/superpowers/specs/2026-03-12-supabase-central-store-design.md
    title: Supabase Central Store
    implements:
      - feature: analytics
        items: [telemetry-collection]
      - feature: setup-configuration
        items: [deployment-modes, sensei-init]
      - feature: codebase-intelligence
        items: [semantic-search]

