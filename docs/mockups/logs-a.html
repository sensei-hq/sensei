// ── Helpers ─────────────────────────────────────────────────────────
const fmtMs = n => n >= 1000 ? (n/1000).toFixed(1)+'s' : n+'ms';
const outcomeColor = o => o==='success' ? 'var(--jade)' : o==='partial' ? 'var(--amber)' : 'var(--shu)';
const sessionSummary = s => {
  const fixes = s.traces.filter(t => t.fix_attempted).length;
  const total = s.traces.length;
  return [fmtMs(s.duration_ms), `${total} steps`].concat(fixes ? [`${fixes} fix${fixes>1?'es':''}`] : []).join(' · ');
};
const anonymize = str => str.replace(/\/Users\/[^/]+\//g, '~/');

// Module metadata
const MODULE_META = {
  bootstrap: { label:'Bootstrap',    kanji:'健' },
  wizard:    { label:'Setup wizard', kanji:'導' },
  projects:  { label:'Projects',     kanji:'組' },
};
const moduleLabel = m => MODULE_META[m]?.label ?? m;

// Extract the date portion of display_time ("Today · 10:42" → "Today")
const dateKey = s => s.display_time.split(' · ')[0];

// Group sessions by date (reverse chron), then by module within each date.
// sessions[] is assumed already sorted newest-first.
const groupByDateThenModule = sessions => {
  const dateOrder = [];
  const dateMap   = {};
  sessions.forEach(s => {
    const dk = dateKey(s);
    if (!dateMap[dk]) { dateMap[dk] = { modOrder:[], modMap:{} }; dateOrder.push(dk); }
    const { modOrder, modMap } = dateMap[dk];
    if (!modMap[s.module]) { modMap[s.module] = []; modOrder.push(s.module); }
    modMap[s.module].push(s);
  });
  return dateOrder.map(dk => ({
    date: dk,
    groups: dateMap[dk].modOrder.map(mod => ({ mod, sessions: dateMap[dk].modMap[mod] })),
  }));
};

function ActionBadge({ type }) {
  const map = {
    check:    { label:'CHECK',    color:'var(--sumi-3)', bg:'var(--paper-3)' },
    resolve:  { label:'RESOLVE',  color:'var(--amber)',  bg:'var(--amber-soft)' },
    instruct: { label:'INSTRUCT', color:'var(--shu)',    bg:'var(--shu-soft)' },
  };
  const m = map[type] || map.check;
  return (
    <span style={{ fontSize:9, fontWeight:600, letterSpacing:'0.12em',
                   padding:'2px 6px', borderRadius:3, color:m.color, background:m.bg,
                   whiteSpace:'nowrap' }}>{m.label}</span>
  );
}

function TraceStatus({ trace }) {
  if (trace.ok) return <span style={{ color:'var(--jade)', fontSize:13, lineHeight:1 }}>✓</span>;
  if (trace.fix_ok) return (
    <div style={{ display:'flex', alignItems:'center', gap:4 }}>
      <span style={{ fontSize:9, color:'var(--amber)', fontWeight:600, letterSpacing:'0.06em' }}>FIXED</span>
    </div>
  );
  return <span style={{ color:'var(--shu)', fontSize:13, lineHeight:1 }}>✗</span>;
}

function TraceRow({ trace, expanded, onToggle }) {
  const hasDetail = trace.out || trace.err || trace.fix_attempted;
  return (
    <div style={{ borderBottom:'var(--hairline)' }}>
      <div onClick={hasDetail ? onToggle : undefined}
           style={{ display:'grid', gridTemplateColumns:'68px 148px 1fr 52px 40px',
                    gap:12, alignItems:'center', padding:'9px 0',
                    cursor: hasDetail ? 'pointer' : 'default' }}>
        <ActionBadge type={trace.action_type}/>
        <span style={{ fontSize:12, fontFamily:'var(--font-mono)', color:'var(--sumi-2)',
                       overflow:'hidden', whiteSpace:'nowrap', textOverflow:'ellipsis' }}>
          {trace.step}
        </span>
        <span style={{ fontSize:11.5, fontFamily:'var(--font-mono)', color:'var(--sumi-4)',
                       overflow:'hidden', whiteSpace:'nowrap', textOverflow:'ellipsis' }}>
          {anonymize(trace.cmd)}
        </span>
        <span style={{ fontSize:11, color:'var(--sumi-4)', fontFeatureSettings:'"tnum"',
                       textAlign:'right' }}>{fmtMs(trace.ms)}</span>
        <div style={{ textAlign:'center' }}><TraceStatus trace={trace}/></div>
      </div>

      {expanded && (
        <div style={{ marginLeft:80, marginBottom:12, padding:'12px 14px',
                      background:'var(--paper-2)', borderRadius:5, border:'var(--hairline)' }}>
          {trace.out && (
            <div style={{ marginBottom: trace.err ? 10 : 0 }}>
              <div style={{ fontSize:9.5, letterSpacing:'0.1em', textTransform:'uppercase',
                             color:'var(--sumi-4)', marginBottom:4 }}>stdout</div>
              <pre style={{ margin:0, fontSize:11.5, fontFamily:'var(--font-mono)',
                             color:'var(--sumi-2)', lineHeight:1.6,
                             whiteSpace:'pre-wrap', wordBreak:'break-all' }}>
                {anonymize(trace.out)}
              </pre>
            </div>
          )}
          {trace.err && (
            <div>
              <div style={{ fontSize:9.5, letterSpacing:'0.1em', textTransform:'uppercase',
                             color:'var(--shu)', marginBottom:4 }}>stderr</div>
              <pre style={{ margin:0, fontSize:11.5, fontFamily:'var(--font-mono)',
                             color:'var(--shu)', lineHeight:1.6 }}>{trace.err}</pre>
            </div>
          )}
          {trace.fix_attempted && (
            <div style={{ marginTop: trace.out || trace.err ? 10 : 0,
                          paddingTop: trace.out || trace.err ? 10 : 0,
                          borderTop: trace.out || trace.err ? 'var(--hairline)' : 'none' }}>
              <div style={{ fontSize:9.5, letterSpacing:'0.1em', textTransform:'uppercase',
                             color:'var(--amber)', marginBottom:4 }}>auto-fix attempted</div>
              <pre style={{ margin:0, fontSize:11.5, fontFamily:'var(--font-mono)',
                             color: trace.fix_ok ? 'var(--jade)' : 'var(--shu)',
                             lineHeight:1.6 }}>
                $ {trace.fix_approach}{'  '}
                <span style={{ color:'var(--sumi-4)', fontSize:10 }}>
                  → {trace.fix_ok ? 'succeeded' : 'failed'}
                </span>
              </pre>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── Issue preview modal ──────────────────────────────────────────────

function IssuePreview({ session, onClose }) {
  const [context, setContext] = React.useState('');
  const [copied, setCopied] = React.useState(false);

  const si = session.system_info;
  const traceMd = session.traces.map(t =>
    `| ${t.step} | ${t.action_type} | \`${anonymize(t.cmd)}\` | ${fmtMs(t.ms)} | ${t.ok ? '✓' : t.fix_ok ? '✓ fixed' : '✗'} |`
  ).join('\n');

  // Build a "Fix details" section for any trace that has stderr or a fix attempt
  const fixTraces = session.traces.filter(t => t.err || t.fix_attempted);
  const fixDetailsMd = fixTraces.length > 0
    ? [
        ``,
        `### Fix details`,
        ``,
        ...fixTraces.flatMap(t => [
          `**${t.step}** (${t.action_type} · ${fmtMs(t.ms)}) — ${t.ok ? '✓' : t.fix_ok ? '✓ fixed' : '✗ failed'}`,
          ...(t.err  ? [`- stderr: \`${t.err}\``] : []),
          ...(t.out && !t.ok ? [`- stdout: \`${anonymize(t.out)}\``] : []),
          ...(t.fix_attempted ? [
            `- fix applied: \`$ ${t.fix_approach}\` → ${t.fix_ok ? 'success' : 'failed'}`
          ] : []),
          ``,
        ]),
      ]
    : [];

  const issueTitle = `Bootstrap diagnostic — ${si.os} · ${si.arch} · v${session.app_version}`;
  const issueBody  = [
    `## System info`,
    `- OS: ${si.os}`,
    `- Architecture: ${si.arch}`,
    `- RAM: ${si.ram_gb} GB · ${si.cpu_cores} cores`,
    `- App version: v${session.app_version}`,
    `- Session: ${session.display_time}`,
    ``,
    `## Bootstrap trace`,
    ``,
    `| Step | Type | Command | Duration | Result |`,
    `|------|------|---------|----------|--------|`,
    traceMd,
    ...fixDetailsMd,
    ...(context ? [``, `## Additional context`, ``, context] : []),
  ].join('\n');

  const copyMd = () => {
    navigator.clipboard?.writeText(issueBody);
    setCopied(true);
    setTimeout(() => setCopied(false), 1400);
  };

  return (
    <div style={{ position:'absolute', inset:0, background:'rgba(0,0,0,0.30)',
                  display:'flex', alignItems:'center', justifyContent:'center', zIndex:20 }}
         onClick={onClose}>
      <div onClick={e => e.stopPropagation()}
           style={{ width:'84vw', maxWidth:960, maxHeight:'90vh', background:'var(--paper)',
                    border:'var(--hairline)', borderRadius:12,
                    display:'flex', flexDirection:'column',
                    boxShadow:'0 24px 60px rgba(0,0,0,.18)' }}>

        {/* modal header */}
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
                      padding:'16px 28px 12px', borderBottom:'var(--hairline)', flexShrink:0 }}>
          <div>
            <div className="display" style={{ fontSize:18, fontWeight:400 }}>Report session</div>
            <div style={{ fontSize:11.5, color:'var(--sumi-4)', marginTop:2 }}>
              {session.display_time} · {session.traces.length} traces ·
              {' '}{session.traces.filter(t=>t.fix_attempted).length} auto-fixes
            </div>
          </div>
          <button onClick={onClose}
                  style={{ background:'transparent', border:'none', cursor:'pointer',
                           color:'var(--sumi-3)', fontSize:20, padding:'4px 8px',
                           lineHeight:1, fontFamily:'var(--font-ui)' }}>×</button>
        </div>

        {/* modal body */}
        <div style={{ flex:1, overflow:'auto', padding:'20px 28px 24px',
                      display:'flex', gap:20 }}>
          {/* preview column */}
          <div style={{ flex:1, display:'flex', flexDirection:'column', gap:8, minHeight:0, overflow:'hidden' }}>
            <div style={{ fontSize:10, letterSpacing:'0.12em', textTransform:'uppercase',
                           color:'var(--sumi-4)' }}>Issue preview — anonymized</div>
            {/* Title field */}
            <div style={{ background:'var(--paper-2)', border:'var(--border-input)',
                           borderRadius:5, padding:'8px 12px',
                           fontSize:13, color:'var(--sumi)', fontWeight:500, flexShrink:0 }}>
              {issueTitle}
            </div>
            {/* Body preview */}
            <div style={{ flex:1, background:'var(--paper-2)', border:'var(--hairline)',
                           borderRadius:5, padding:'12px 14px',
                           fontFamily:'var(--font-mono)', fontSize:11.5,
                           color:'var(--sumi-2)', lineHeight:1.7,
                           overflow:'auto', whiteSpace:'pre-wrap', wordBreak:'break-word',
                           minHeight:0 }}>
              {issueBody}
            </div>
          </div>

          {/* compose column */}
          <div style={{ width:264, flexShrink:0, display:'flex', flexDirection:'column', gap:12 }}>

            {/* What's included summary */}
            <div style={{ background:'var(--paper-2)', border:'var(--hairline)',
                           borderRadius:6, padding:'12px 14px' }}>
              <div style={{ fontSize:9.5, letterSpacing:'0.12em', textTransform:'uppercase',
                             color:'var(--sumi-4)', marginBottom:8 }}>included in report</div>
              {[
                ['Session',  session.display_time],
                ['OS',       si.os],
                ['Arch',     si.arch],
                ['RAM',      `${si.ram_gb} GB`],
                ['Traces',   session.traces.length],
                ['Fixes',    session.traces.filter(t=>t.fix_attempted).length],
                ['App',      `v${session.app_version}`],
              ].map(([k, v]) => (
                <div key={k} style={{ display:'flex', justifyContent:'space-between',
                                       fontSize:11.5, marginBottom:3 }}>
                  <span style={{ color:'var(--sumi-4)' }}>{k}</span>
                  <span style={{ color:'var(--sumi-2)',
                                  fontFamily: ['Session','OS','Arch'].includes(k) ? 'var(--font-ui)' : 'var(--font-mono)',
                                  fontSize: ['OS','Arch'].includes(k) ? 10.5 : 11.5 }}>{v}</span>
                </div>
              ))}
            </div>

            <div>
              <div style={{ fontSize:9.5, letterSpacing:'0.12em', textTransform:'uppercase',
                             color:'var(--sumi-4)', marginBottom:6 }}>Additional context</div>
              <textarea value={context} onChange={e => setContext(e.target.value)}
                        placeholder="What were you doing? Any other details…"
                        style={{ width:'100%', height:88, resize:'none',
                                 fontFamily:'var(--font-ui)', fontSize:12.5, color:'var(--sumi)',
                                 background:'var(--paper-2)', border:'var(--border-input)',
                                 borderRadius:5, padding:'8px 10px', lineHeight:1.5 }}/>
            </div>

            <div style={{ fontSize:11, color:'var(--sumi-4)', lineHeight:1.7 }}>
              Paths like <code style={{ fontFamily:'var(--font-mono)', fontSize:10.5,
                                        background:'var(--paper-3)', padding:'1px 5px', borderRadius:3 }}>/Users/</code>
              {' '}are replaced with{' '}
              <code style={{ fontFamily:'var(--font-mono)', fontSize:10.5,
                              background:'var(--paper-3)', padding:'1px 5px', borderRadius:3 }}>~/</code>.
              No personal data is included.
            </div>

            <div style={{ display:'flex', flexDirection:'column', gap:8, marginTop:'auto' }}>
              <button style={{ width:'100%', fontSize:13, fontWeight:500, textAlign:'center',
                               color:'var(--paper)', background:'var(--sumi)',
                               border:'none', padding:'10px 16px',
                               borderRadius:6, cursor:'pointer', fontFamily:'var(--font-ui)' }}
                      onClick={() => alert('Opens github.com/sensei-hq/app/issues/new')}>
                Submit to GitHub ↗
              </button>
              <button onClick={copyMd}
                      style={{ width:'100%', fontSize:12.5, fontWeight:500,
                               color: copied ? 'var(--jade)' : 'var(--sumi)',
                               background:'transparent', border:'var(--border-card)',
                               padding:'8px 16px', borderRadius:6, cursor:'pointer',
                               fontFamily:'var(--font-ui)', transition:'color 0.2s' }}>
                {copied ? 'Copied ✓' : 'Copy markdown'}
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Main screen ──────────────────────────────────────────────────────

function LogsScreen() {
  const [selectedId,    setSelectedId]    = React.useState(STUB_SESSIONS[0].id);
  const [expandedId,    setExpandedId]    = React.useState(null);
  const [showPreview,   setShowPreview]   = React.useState(false);
  const [expandedDates, setExpandedDates] = React.useState(new Set(['Today']));

  const session = STUB_SESSIONS.find(s => s.id === selectedId) || STUB_SESSIONS[0];
  const toggleTrace = id => setExpandedId(p => p === id ? null : id);
  const toggleDate  = dk => setExpandedDates(prev => {
    const next = new Set(prev);
    next.has(dk) ? next.delete(dk) : next.add(dk);
    return next;
  });
  const dateGroups = groupByDateThenModule(STUB_SESSIONS);

  const statsRow = [
    { label:'Total time',   value: fmtMs(session.duration_ms) },
    { label:'Traces',       value: session.traces.length },
    { label:'Auto-fixes',   value: session.traces.filter(t => t.fix_attempted).length },
    { label:'Outcome',      value: session.outcome, color: outcomeColor(session.outcome) },
  ];

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column', position:'relative' }}>
      <TauriChrome title="Sensei  先生  ·  logs"/>

      <div style={{ flex:1, display:'flex', minHeight:0 }}>

        {/* ── Sidebar: session list ── */}
        <div style={{ width:248, flexShrink:0, borderRight:'var(--hairline)',
                      display:'flex', flexDirection:'column', background:'var(--paper-2)' }}>
          <div style={{ padding:'22px 20px 14px', borderBottom:'var(--hairline)', flexShrink:0 }}>
            <div style={{ display:'flex', alignItems:'center', gap:10 }}>
              <span className="kanji" style={{ fontSize:18, color:'var(--shu)' }}>診</span>
              <span style={{ fontSize:11, letterSpacing:'0.14em', textTransform:'uppercase',
                              color:'var(--sumi-3)' }}>diagnostic logs</span>
            </div>
          </div>

          <div style={{ flex:1, overflowY:'auto', padding:'8px 0' }}>
            {dateGroups.map(({ date, groups }) => {
              const open = expandedDates.has(date);
              return (
                <div key={date}>
                  {/* ── Date header (collapsible) ── */}
                  <div onClick={() => toggleDate(date)}
                       style={{ display:'flex', alignItems:'center', gap:6,
                                 padding:'7px 20px 5px', cursor:'pointer',
                                 userSelect:'none' }}>
                    <span style={{ fontSize:9, color:'var(--sumi-4)', lineHeight:1,
                                    transform: open ? 'none' : 'rotate(-90deg)',
                                    display:'inline-block', transition:'transform 0.15s' }}>▾</span>
                    <span style={{ fontSize:11, fontWeight:600, letterSpacing:'0.06em',
                                    textTransform:'uppercase', color:'var(--sumi-2)' }}>{date}</span>
                  </div>

                  {/* ── Sessions under this date, grouped by module ── */}
                  {open && groups.map(({ mod, sessions: grp }) => (
                    <div key={mod}>
                      {/* Module sub-header */}
                      <div style={{ display:'flex', alignItems:'center', gap:6,
                                     padding:'4px 20px 2px 30px' }}>
                        <span className="kanji"
                              style={{ fontSize:11, color:'var(--sumi-4)', lineHeight:1 }}>
                          {MODULE_META[mod]?.kanji ?? '◆'}
                        </span>
                        <span style={{ fontSize:9, letterSpacing:'0.13em',
                                        textTransform:'uppercase', color:'var(--sumi-4)' }}>
                          {moduleLabel(mod)}
                        </span>
                      </div>

                      {/* Session rows */}
                      {grp.map(s => {
                        const sel = s.id === selectedId;
                        const isCurrent = s.id === STUB_SESSIONS[0].id;
                        return (
                          <div key={s.id}
                               onClick={() => { setSelectedId(s.id); setExpandedId(null); }}
                               style={{ padding:'7px 20px 7px 36px', cursor:'pointer',
                                         background: sel ? 'var(--paper)' : 'transparent',
                                         borderLeft: sel ? '2px solid var(--shu)' : '2px solid transparent',
                                         transition:'background 0.12s' }}>
                            {isCurrent && (
                              <div style={{ fontSize:9, letterSpacing:'0.13em',
                                             textTransform:'uppercase',
                                             color:'var(--shu)', marginBottom:2 }}>current</div>
                            )}
                            <div style={{ display:'flex', alignItems:'center', gap:6, marginBottom:2 }}>
                              <span style={{ width:6, height:6, borderRadius:'50%', flexShrink:0,
                                              background: outcomeColor(s.outcome) }}/>
                              <span style={{ fontSize:12.5, fontWeight:500,
                                              color: sel ? 'var(--sumi)' : 'var(--sumi-2)' }}>
                                {s.display_time.split(' · ')[1]}
                              </span>
                            </div>
                            <div style={{ marginLeft:12, fontSize:10.5, color:'var(--sumi-4)' }}>
                              {sessionSummary(s)}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  ))}
                </div>
              );
            })}
          </div>
        </div>

        {/* ── Main panel: trace detail ── */}
        <div style={{ flex:1, display:'flex', flexDirection:'column', minWidth:0 }}>

          {/* Session header */}
          <div style={{ padding:'22px 36px 16px', borderBottom:'var(--hairline)', flexShrink:0 }}>
            <div style={{ display:'flex', alignItems:'flex-start', justifyContent:'space-between', marginBottom:16 }}>
              <div>
                <div style={{ fontSize:9.5, letterSpacing:'0.14em', textTransform:'uppercase',
                              color:'var(--sumi-4)', marginBottom:6 }}>
                  {moduleLabel(session.module)}
                </div>
                <h2 className="display"
                    style={{ fontSize:22, fontWeight:400, margin:'0 0 6px', letterSpacing:'-0.01em' }}>
                  {session.display_time}
                </h2>
                <div style={{ display:'flex', gap:10, flexWrap:'wrap', fontSize:12, color:'var(--sumi-4)' }}>
                  {[session.system_info.os, session.system_info.arch,
                    `${session.system_info.ram_gb} GB`, `${session.system_info.cpu_cores} cores`,
                    `v${session.app_version}`].map((v, i, a) => (
                    <React.Fragment key={i}>
                      <span>{v}</span>
                      {i < a.length-1 && <span style={{ color:'var(--sumi-4)', opacity:0.4 }}>·</span>}
                    </React.Fragment>
                  ))}
                </div>
              </div>
              <button onClick={() => setShowPreview(true)}
                      style={{ flexShrink:0, marginTop:4, fontSize:12.5, fontWeight:500,
                               color:'var(--paper)', background:'var(--sumi)',
                               border:'none', padding:'9px 16px',
                               borderRadius:6, cursor:'pointer', fontFamily:'var(--font-ui)' }}>
                Report this session ↗
              </button>
            </div>

            {/* Stats row */}
            <div style={{ display:'flex', gap:24 }}>
              {statsRow.map(st => (
                <div key={st.label} style={{ display:'flex', flexDirection:'column', gap:2 }}>
                  <div style={{ fontSize:9.5, letterSpacing:'0.12em', textTransform:'uppercase',
                                 color:'var(--sumi-4)' }}>{st.label}</div>
                  <div style={{ fontSize:14, fontWeight:500,
                                 color: st.color || 'var(--sumi)' }}>{st.value}</div>
                </div>
              ))}
            </div>
          </div>

          {/* Column headers */}
          <div style={{ display:'grid', gridTemplateColumns:'68px 148px 1fr 52px 40px',
                        gap:12, padding:'7px 36px',
                        borderBottom:'var(--hairline)', background:'var(--paper-2)',
                        flexShrink:0 }}>
            {['action', 'step', 'command', 'duration', ''].map((h, i) => (
              <div key={i} style={{ fontSize:9.5, letterSpacing:'0.12em', textTransform:'uppercase',
                                     color:'var(--sumi-4)',
                                     textAlign: i === 3 ? 'right' : 'left' }}>{h}</div>
            ))}
          </div>

          {/* Trace list */}
          <div style={{ flex:1, overflowY:'auto', padding:'0 36px' }}>
            {session.traces.map(t => (
              <TraceRow key={t.id} trace={t}
                        expanded={expandedId === t.id}
                        onToggle={() => toggleTrace(t.id)}/>
            ))}
            <div style={{ height:32 }}/>
          </div>

        </div>
      </div>

      {/* Issue preview modal */}
      {showPreview && <IssuePreview session={session} onClose={() => setShowPreview(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<LogsScreen/>);
</script>
</body>
</html>
