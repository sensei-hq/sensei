// ── Helpers ──────────────────────────────────────────────────────────
const fmtMs = n => n >= 1000 ? (n/1000).toFixed(1)+'s' : n+'ms';
const outcomeColor = o => o==='success' ? 'var(--jade)' : o==='partial' ? 'var(--amber)' : 'var(--shu)';
const anonymize = str => str.replace(/\/Users\/[^/]+\//g, '~/');

// ── Shared primitives ────────────────────────────────────────────────

function TauriChrome({ title }) {
  return (
    <div style={{ height:48, flexShrink:0, display:'flex', alignItems:'center',
                  justifyContent:'space-between', padding:'0 16px',
                  borderBottom:'var(--hairline)', WebkitAppRegion:'drag' }}>
      <div style={{ display:'flex', gap:6 }}>
        {[0,1,2].map(i => (
          <span key={i} style={{ width:12, height:12, borderRadius:'50%', background:'var(--paper-edge)' }}/>
        ))}
      </div>
      <div style={{ fontSize:12, color:'var(--sumi-4)', letterSpacing:'0.04em' }}>{title}</div>
      <div style={{ width:54 }}/>
    </div>
  );
}

// ── Trace card ───────────────────────────────────────────────────────
// Variant B uses "open cards" — details always visible for non-ok traces,
// collapsible for ok traces. Each trace is self-contained.

function TraceCard({ trace }) {
  const [open, setOpen] = React.useState(!trace.ok || trace.fix_attempted);

  // Left accent bar color
  const barColor = trace.ok ? 'var(--jade)'
                 : trace.fix_ok ? 'var(--amber)'
                 : 'var(--shu)';

  // Action type label
  const actionMap = {
    check:    { label:'CHECK',    color:'var(--sumi-3)',  bg:'var(--paper-3)' },
    resolve:  { label:'RESOLVE',  color:'var(--amber)',   bg:'var(--amber-soft)' },
    instruct: { label:'INSTRUCT', color:'var(--shu)',     bg:'var(--shu-soft)' },
  };
  const am = actionMap[trace.action_type] || actionMap.check;

  return (
    <div style={{ borderBottom:'var(--hairline)', borderLeft:`2px solid ${barColor}`,
                  paddingLeft:12, transition:'border-color 0.2s' }}>
      {/* Card header row */}
      <div onClick={() => setOpen(p => !p)}
           style={{ display:'flex', alignItems:'center', gap:10, padding:'10px 0',
                    cursor:'pointer' }}>
        {/* Action badge */}
        <span style={{ fontSize:9, fontWeight:600, letterSpacing:'0.12em',
                        padding:'2px 6px', borderRadius:3,
                        color:am.color, background:am.bg, flexShrink:0 }}>{am.label}</span>

        {/* Step + description */}
        <div style={{ flex:1, display:'flex', alignItems:'baseline', gap:8, minWidth:0 }}>
          <span style={{ fontSize:12.5, fontFamily:'var(--font-mono)', color:'var(--sumi-2)',
                          flexShrink:0 }}>{trace.step}</span>
          <span style={{ fontSize:12, color:'var(--sumi-4)',
                          overflow:'hidden', whiteSpace:'nowrap', textOverflow:'ellipsis' }}>
            {trace.desc}
          </span>
        </div>

        {/* Duration */}
        <span style={{ fontSize:11, color:'var(--sumi-4)', fontFeatureSettings:'"tnum"',
                        flexShrink:0 }}>{fmtMs(trace.ms)}</span>

        {/* Status */}
        <div style={{ flexShrink:0, width:52, textAlign:'right' }}>
          {trace.ok && <span style={{ color:'var(--jade)', fontSize:12 }}>✓</span>}
          {!trace.ok && trace.fix_ok && (
            <span style={{ fontSize:9, fontWeight:600, letterSpacing:'0.08em',
                            color:'var(--amber)', background:'var(--amber-soft)',
                            padding:'2px 6px', borderRadius:3 }}>FIXED</span>
          )}
          {!trace.ok && !trace.fix_ok && <span style={{ color:'var(--shu)', fontSize:12 }}>✗</span>}
        </div>

        {/* Expand chevron (only for items with detail) */}
        {(trace.out || trace.err || trace.fix_attempted) && (
          <span style={{ fontSize:10, color:'var(--sumi-4)', flexShrink:0,
                          transform: open ? 'rotate(90deg)' : 'none',
                          transition:'transform 0.15s', marginLeft:2 }}>▶</span>
        )}
      </div>

      {/* Command line — always visible */}
      <div style={{ fontSize:11.5, fontFamily:'var(--font-mono)', color:'var(--sumi-4)',
                     paddingBottom:10, paddingRight:8 }}>
        <span style={{ color:'var(--sumi-4)', opacity:0.5, marginRight:6 }}>$</span>
        {anonymize(trace.cmd)}
      </div>

      {/* Expanded detail */}
      {open && (trace.out || trace.err || trace.fix_attempted) && (
        <div style={{ marginBottom:12, padding:'10px 12px',
                      background:'var(--paper-2)', borderRadius:5, border:'var(--hairline)' }}>
          {trace.out && (
            <div style={{ marginBottom: trace.err ? 8 : 0 }}>
              <span style={{ fontSize:9.5, letterSpacing:'0.1em', textTransform:'uppercase',
                              color:'var(--sumi-4)', marginRight:10 }}>out</span>
              <code style={{ fontFamily:'var(--font-mono)', fontSize:11.5,
                              color:'var(--sumi-2)' }}>{anonymize(trace.out)}</code>
            </div>
          )}
          {trace.err && (
            <div style={{ marginBottom: trace.fix_attempted ? 8 : 0 }}>
              <span style={{ fontSize:9.5, letterSpacing:'0.1em', textTransform:'uppercase',
                              color:'var(--shu)', marginRight:10 }}>err</span>
              <code style={{ fontFamily:'var(--font-mono)', fontSize:11.5,
                              color:'var(--shu)' }}>{trace.err}</code>
            </div>
          )}
          {trace.fix_attempted && (
            <div style={{ paddingTop: trace.out || trace.err ? 8 : 0,
                          borderTop: trace.out || trace.err ? 'var(--hairline)' : 'none' }}>
              <span style={{ fontSize:9.5, letterSpacing:'0.1em', textTransform:'uppercase',
                              color:'var(--amber)', marginRight:10 }}>fix</span>
              <code style={{ fontFamily:'var(--font-mono)', fontSize:11.5,
                              color: trace.fix_ok ? 'var(--jade)' : 'var(--shu)' }}>
                $ {trace.fix_approach}
              </code>
              <span style={{ fontSize:10, color:'var(--sumi-4)', marginLeft:8 }}>
                → {trace.fix_ok ? 'success' : 'failed'}
              </span>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ── Issue modal ───────────────────────────────────────────────────────
// Variant B uses a centered dialog instead of a bottom sheet.

function IssueModal({ session, onClose }) {
  const [context, setContext] = React.useState('');
  const [copied, setCopied] = React.useState(false);

  const si = session.system_info;
  const traceMd = session.traces.map(t =>
    `| ${t.step} | ${t.action_type} | \`${anonymize(t.cmd)}\` | ${fmtMs(t.ms)} | ${t.ok ? '✓' : t.fix_ok ? '✓ fixed' : '✗'} |`
  ).join('\n');

  const issueTitle = `Bootstrap diagnostic — ${si.os} · ${si.arch} · v${session.app_version}`;
  const issueBody = [
    `## System info`,
    `- OS: ${si.os}`,
    `- Architecture: ${si.arch}`,
    `- RAM: ${si.ram_gb} GB · ${si.cpu_cores} cores`,
    `- App version: v${session.app_version}`,
    `- Session: ${session.display_time}`,
    ``,
    `## Bootstrap trace`,
    ``,
    `| Step | Type | Command | Duration | Result |`,
    `|------|------|---------|----------|--------|`,
    traceMd,
    ...(context ? [``, `## Additional context`, ``, context] : []),
  ].join('\n');

  const copyMd = () => {
    navigator.clipboard?.writeText(issueBody);
    setCopied(true);
    setTimeout(() => setCopied(false), 1400);
  };

  return (
    <div style={{ position:'fixed', inset:0, background:'rgba(0,0,0,0.28)',
                  display:'flex', alignItems:'center', justifyContent:'center',
                  zIndex:30, padding:24 }}
         onClick={onClose}>
      <div onClick={e => e.stopPropagation()}
           style={{ width:'100%', maxWidth:820, maxHeight:'84vh',
                    background:'var(--paper)', borderRadius:10, border:'var(--hairline)',
                    display:'flex', flexDirection:'column',
                    boxShadow:'0 16px 60px rgba(0,0,0,.15)' }}>

        {/* Modal header */}
        <div style={{ padding:'20px 24px 16px', borderBottom:'var(--hairline)',
                      display:'flex', alignItems:'flex-start', justifyContent:'space-between',
                      flexShrink:0 }}>
          <div>
            <div className="display" style={{ fontSize:19, fontWeight:400, marginBottom:4 }}>
              Report session
            </div>
            <div style={{ fontSize:12, color:'var(--sumi-4)' }}>
              This will open a pre-filled GitHub issue on{' '}
              <code style={{ fontFamily:'var(--font-mono)', fontSize:11.5 }}>sensei-hq/app</code>.
              Review the content below before submitting.
            </div>
          </div>
          <button onClick={onClose}
                  style={{ background:'transparent', border:'none', cursor:'pointer',
                           color:'var(--sumi-3)', fontSize:20, padding:'4px 8px',
                           lineHeight:1, fontFamily:'var(--font-ui)', marginLeft:16, flexShrink:0 }}>×</button>
        </div>

        {/* Modal body */}
        <div style={{ flex:1, overflow:'auto', padding:'16px 24px',
                      display:'flex', gap:16 }}>

          {/* Preview pane */}
          <div style={{ flex:1, display:'flex', flexDirection:'column', gap:8 }}>
            <div style={{ fontSize:10, letterSpacing:'0.12em', textTransform:'uppercase',
                           color:'var(--sumi-4)' }}>Issue preview — anonymized</div>

            {/* Title field */}
            <div style={{ background:'var(--paper-2)', border:'var(--border-input)',
                           borderRadius:5, padding:'8px 12px',
                           fontSize:13, color:'var(--sumi)', fontWeight:500 }}>
              {issueTitle}
            </div>

            {/* Body preview */}
            <div style={{ flex:1, background:'var(--paper-2)', border:'var(--hairline)',
                           borderRadius:5, padding:'12px 14px',
                           fontFamily:'var(--font-mono)', fontSize:11.5,
                           color:'var(--sumi-2)', lineHeight:1.7,
                           overflow:'auto', whiteSpace:'pre-wrap', wordBreak:'break-word',
                           maxHeight:'36vh' }}>
              {issueBody}
            </div>
          </div>

          {/* Sidebar: context + actions */}
          <div style={{ width:240, flexShrink:0, display:'flex', flexDirection:'column', gap:14 }}>

            {/* Session snapshot */}
            <div style={{ background:'var(--paper-2)', border:'var(--hairline)',
                           borderRadius:6, padding:'12px 14px' }}>
              <div style={{ fontSize:9.5, letterSpacing:'0.12em', textTransform:'uppercase',
                             color:'var(--sumi-4)', marginBottom:8 }}>included in report</div>
              {[
                ['Session',    session.display_time],
                ['OS',         si.os],
                ['Arch',       si.arch],
                ['RAM',        `${si.ram_gb} GB`],
                ['Traces',     session.traces.length],
                ['App',        `v${session.app_version}`],
              ].map(([k, v]) => (
                <div key={k} style={{ display:'flex', justifyContent:'space-between',
                                       fontSize:12, marginBottom:4 }}>
                  <span style={{ color:'var(--sumi-4)' }}>{k}</span>
                  <span style={{ color:'var(--sumi-2)', fontFamily: k==='Session'||k==='OS'||k==='Arch' ? 'var(--font-ui)' : 'var(--font-mono)', fontSize: k==='OS'||k==='Arch' ? 11 : 12 }}>{v}</span>
                </div>
              ))}
            </div>

            {/* Additional context */}
            <div>
              <div style={{ fontSize:10, letterSpacing:'0.12em', textTransform:'uppercase',
                             color:'var(--sumi-4)', marginBottom:6 }}>Additional context</div>
              <textarea value={context} onChange={e => setContext(e.target.value)}
                        placeholder="What happened? Anything else to add…"
                        style={{ width:'100%', height:88, resize:'none',
                                 fontFamily:'var(--font-ui)', fontSize:12.5, color:'var(--sumi)',
                                 background:'var(--paper-2)', border:'var(--border-input)',
                                 borderRadius:5, padding:'8px 10px', lineHeight:1.5 }}/>
            </div>

            <div style={{ fontSize:11, color:'var(--sumi-4)', lineHeight:1.7 }}>
              Folder paths are anonymized to{' '}
              <code style={{ fontFamily:'var(--font-mono)', fontSize:10.5,
                              background:'var(--paper-3)', padding:'1px 4px', borderRadius:3 }}>~/</code>.
            </div>

            <div style={{ display:'flex', flexDirection:'column', gap:8, marginTop:'auto' }}>
              <button className="btn-solid" style={{ width:'100%', fontSize:13, padding:'10px 16px' }}
                      onClick={() => alert('Opens github.com/sensei-hq/app/issues/new')}>
                Submit to GitHub ↗
              </button>
              <button onClick={copyMd}
                      style={{ width:'100%', fontSize:12.5, fontWeight:500,
                               color: copied ? 'var(--jade)' : 'var(--sumi)',
                               background:'transparent', border:'var(--border-card)',
                               padding:'8px 16px', borderRadius:6, cursor:'pointer',
                               fontFamily:'var(--font-ui)', transition:'color 0.2s' }}>
                {copied ? 'Copied ✓' : 'Copy markdown'}
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Main screen ───────────────────────────────────────────────────────

function LogsScreen() {
  const [activeIdx, setActiveIdx] = React.useState(0);
  const [showModal, setShowModal] = React.useState(false);

  const session = STUB_SESSIONS[activeIdx];
  const si = session.system_info;

  return (
    <div style={{ height:'100%', display:'flex', flexDirection:'column', position:'relative' }}>
      <TauriChrome title="Sensei  先生  ·  logs"/>

      {/* Page header */}
      <div style={{ padding:'22px 40px 0', flexShrink:0 }}>
        <div style={{ maxWidth:820, margin:'0 auto' }}>

          {/* Title row */}
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between',
                         marginBottom:20 }}>
            <div style={{ display:'flex', alignItems:'center', gap:12 }}>
              <span className="kanji" style={{ fontSize:22, color:'var(--shu)' }}>診</span>
              <div>
                <h1 className="display" style={{ fontSize:24, fontWeight:400, margin:0,
                                                  letterSpacing:'-0.015em' }}>
                  Diagnostic logs
                </h1>
                <div style={{ fontSize:11.5, color:'var(--sumi-4)', marginTop:3 }}>
                  Bootstrap sessions · each app launch is captured
                </div>
              </div>
            </div>
            <button onClick={() => setShowModal(true)}
                    style={{ fontSize:13, fontWeight:500, color:'var(--paper)',
                             background:'var(--sumi)', border:'none',
                             padding:'9px 18px', borderRadius:6, cursor:'pointer',
                             fontFamily:'var(--font-ui)' }}>
              Report this session ↗
            </button>
          </div>

          {/* Session tabs */}
          <div style={{ display:'flex', gap:0, borderBottom:'var(--hairline)' }}>
            {STUB_SESSIONS.map((s, i) => {
              const active = i === activeIdx;
              return (
                <button key={s.id} onClick={() => setActiveIdx(i)}
                        style={{ fontSize:12.5, fontWeight: active ? 500 : 400,
                                 color: active ? 'var(--sumi)' : 'var(--sumi-3)',
                                 background:'transparent', border:'none', cursor:'pointer',
                                 padding:'8px 16px', fontFamily:'var(--font-ui)',
                                 borderBottom: active ? '2px solid var(--sumi)' : '2px solid transparent',
                                 marginBottom:'-1px', transition:'color 0.12s',
                                 display:'flex', alignItems:'center', gap:8 }}>
                  <span style={{ width:6, height:6, borderRadius:'50%',
                                  background: outcomeColor(s.outcome), flexShrink:0 }}/>
                  {s.display_time}
                </button>
              );
            })}
          </div>

        </div>
      </div>

      {/* Content */}
      <div style={{ flex:1, overflowY:'auto', padding:'0 40px' }}>
        <div style={{ maxWidth:820, margin:'0 auto', paddingBottom:40 }}>

          {/* System info bar */}
          <div style={{ display:'flex', gap:0, padding:'14px 0', borderBottom:'var(--hairline)',
                         alignItems:'center', flexWrap:'wrap' }}>
            {[
              { label:'OS',       value: si.os },
              { label:'Arch',     value: si.arch },
              { label:'RAM',      value: `${si.ram_gb} GB` },
              { label:'Cores',    value: si.cpu_cores },
              { label:'App',      value: `v${session.app_version}` },
              { label:'Duration', value: fmtMs(session.duration_ms) },
              { label:'Outcome',  value: session.outcome, valueColor: outcomeColor(session.outcome) },
            ].map((item, i, arr) => (
              <React.Fragment key={item.label}>
                <div style={{ display:'flex', alignItems:'center', gap:6, padding:'2px 14px 2px 0' }}>
                  <span style={{ fontSize:10, letterSpacing:'0.1em', textTransform:'uppercase',
                                  color:'var(--sumi-4)' }}>{item.label}</span>
                  <span style={{ fontSize:12.5, color: item.valueColor || 'var(--sumi-2)',
                                  fontFeatureSettings:'"tnum"' }}>{item.value}</span>
                </div>
                {i < arr.length-1 && (
                  <span style={{ fontSize:11, color:'var(--paper-edge)', marginRight:14,
                                  opacity: 0.5 }}>·</span>
                )}
              </React.Fragment>
            ))}
          </div>

          {/* Summary: quick stats */}
          <div style={{ display:'flex', gap:16, padding:'14px 0', borderBottom:'var(--hairline)',
                         fontSize:12, color:'var(--sumi-4)', alignItems:'center' }}>
            <span style={{ color:'var(--sumi-3)' }}>{session.traces.length} traces</span>
            <span>·</span>
            <span style={{ color:'var(--sumi-3)' }}>
              {session.traces.filter(t => t.action_type === 'check').length} checks
            </span>
            <span>·</span>
            <span style={{ color:'var(--amber)' }}>
              {session.traces.filter(t => t.action_type === 'resolve').length} resolves
            </span>
            {session.traces.filter(t => t.fix_attempted).length > 0 && (
              <>
                <span>·</span>
                <span style={{ color:'var(--amber)' }}>
                  {session.traces.filter(t => t.fix_attempted).length} auto-fixes applied
                </span>
              </>
            )}
            <div style={{ flex:1 }}/>
            <span style={{ fontSize:11, color:'var(--sumi-4)' }}>
              Click a trace to expand · amber = issue found
            </span>
          </div>

          {/* Trace cards */}
          <div style={{ paddingTop:4 }}>
            {session.traces.map(t => <TraceCard key={t.id} trace={t}/>)}
          </div>

        </div>
      </div>

      {/* Issue modal */}
      {showModal && <IssueModal session={session} onClose={() => setShowModal(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<LogsScreen/>);
</script>
</body>
</html>
