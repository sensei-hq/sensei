  <script>
    // Swallow the benign ResizeObserver "loop completed" warning emitted by
    // the design canvas's pan-zoom logic. Two layers: wrap the RO callback in
    // rAF, and intercept the global error event the browser fires.
    (function() {
      window.addEventListener('error', function(e) {
        if (e && e.message && String(e.message).includes('ResizeObserver loop')) {
          e.stopImmediatePropagation();
          e.preventDefault();
        }
      });
      if (typeof window.ResizeObserver === 'undefined') return;
      const NativeRO = window.ResizeObserver;
      window.ResizeObserver = class extends NativeRO {
        constructor(cb) {
          super((entries, observer) => {
            window.requestAnimationFrame(() => {
              try { cb(entries, observer); } catch (e) {
                if (!String(e && e.message).includes('ResizeObserver loop')) throw e;
              }
            });
          });
        }
      };
    })();
  </script>

    // Tweaks — dark/light mode
    const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "dark"
    }/*EDITMODE-END*/;

    const App = () => {
      const [editMode, setEditMode] = React.useState(false);
      const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);

      // Apply theme to the document for tokens to cascade
      React.useEffect(() => {
        document.documentElement.setAttribute('data-theme', tweaks.theme);
      }, [tweaks.theme]);

      // Edit mode protocol
      React.useEffect(() => {
        const onMsg = (e) => {
          const d = e.data || {};
          if (d.type === '__activate_edit_mode') setEditMode(true);
          if (d.type === '__deactivate_edit_mode') setEditMode(false);
        };
        window.addEventListener('message', onMsg);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', onMsg);
      }, []);

      const setTweak = (k, v) => {
        const next = { ...tweaks, [k]: v };
        setTweaks(next);
        window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');

              <DCArtboard id="boot-old-brew"   label="6-gate · Homebrew missing" width={1280} height={860}>
                <div className="artboard-shell"><Bootstrap scenario="missing-homebrew" onReady={()=>{}}/></div>
              </DCArtboard>
              <DCArtboard id="boot-old-db"     label="6-gate · DB couldn't be created" width={1280} height={860}>
                <div className="artboard-shell"><Bootstrap scenario="missing-db" onReady={()=>{}}/></div>
              </DCArtboard>
            </DCSection>

            <DCSection id="discarded-project"
                       title="Discarded · old Project page (top-tabs layout)"
                       subtitle="Replaced by the Project window with sidebar (Flow ④). Kept here for reference.">
              <DCArtboard id="proj-tabs-old" label="Project page · top-tabs (old)" width={1280} height={860}>
                <div className="artboard-shell"><ProjectPageTopTabs/></div>
              </DCArtboard>
            </DCSection>

            <DCSection id="discarded-learnings"
                       title="Discarded · old Learnings layouts"
                       subtitle="Earlier explorations kept for reference. Insights / Memories now lives in the supporting cardboards above.">
              <DCArtboard id="learn-all" label="Original · inbox + tabs + memory feed" width={1280} height={900}>
                <div className="artboard-shell"><LearningsPage/></div>
              </DCArtboard>
              <DCArtboard id="learn-drawer" label="Original · memory drawer open" width={1280} height={900}>
                <div className="artboard-shell"><LearningsPageWithDrawer/></div>
              </DCArtboard>
            </DCSection>

            <DCSection id="discarded-sessions"
                       title="Discarded · old Sessions layouts"
                       subtitle="Original two takes — replaced by the Zen series in the Sessions supporting cardboard.">
              <DCArtboard id="sess-digest-original" label="Digest v1 · retro + full session list" width={1280} height={900}>
                <div className="artboard-shell"><SessionsDigest/></div>
              </DCArtboard>
              <DCArtboard id="sess-timeline" label="Timeline · heatmap + grouped feed" width={1280} height={900}>
                <div className="artboard-shell"><SessionsTimeline/></div>
              </DCArtboard>
            </DCSection>

            <DCSection id="discarded-refined"
                       title="Discarded · earlier shell direction"
                       subtitle="Refined direction · Ma's trendline + wider sidebar · Enso's layout + icon-only collapsed state. Superseded by the current Observatory shell.">
              <DCArtboard id="merged" label="Merged · collapsible sidebar + trendline" width={1280} height={820}>
                <div className="artboard-shell"><MergedApp/></div>
              </DCArtboard>
            </DCSection>

            <DCSection id="discarded-sensei"
                       title="Discarded · original three directions"
                       subtitle="Ma · Enso · Shoji — the three brand explorations that informed the final design.">
              <DCArtboard id="ma"    label="01 · 間 Ma — negative space"  width={1280} height={820}>
                <div className="artboard-shell"><MaApp/></div>
              </DCArtboard>
              <DCArtboard id="enso"  label="02 · 円 Enso — brushstroke ring" width={1280} height={820}>
                <div className="artboard-shell"><EnsoApp/></div>
              </DCArtboard>
              <DCArtboard id="shoji" label="03 · 障子 Shoji — panes"       width={1280} height={820}>
                <div className="artboard-shell"><ShojiApp/></div>
              </DCArtboard>
            </DCSection>
          </DesignCanvas>

          {editMode && (
            <div style={{
              position: 'fixed', right: 20, bottom: 20, zIndex: 999,
              background: 'var(--paper)', border: '1px solid var(--edge)',
              borderRadius: 'var(--radius-lg)', padding: 'var(--space-4)', width: 240,
              boxShadow: 'var(--shadow)',
              fontFamily: 'var(--font-ui)'
            }}>
              <div style={{ fontSize: 'var(--text-xs)', letterSpacing: 'var(--tracking-wide)', textTransform: 'uppercase',
                            color: 'var(--ink-3)', marginBottom: 'var(--space-3)', fontWeight: 500 }}>Tweaks</div>
              <div style={{ fontSize: 'var(--text-sm)', color: 'var(--ink-2)', marginBottom: 'var(--space-1)' }}>Theme</div>
              <div style={{ display: 'flex', gap: 4, padding: 3, background: 'var(--paper-3)',
                            borderRadius: 'var(--radius)' }}>
                {['light','dark'].map(t => (
                  <button key={t} onClick={() => setTweak('theme', t)}
                          style={{ flex: 1, padding: '6px 10px', fontSize: 'var(--text-sm)', border: 'none',
                                    borderRadius: 'var(--radius-sm)', background: tweaks.theme === t ? 'var(--paper)' : 'transparent',
                                    color: tweaks.theme === t ? 'var(--ink)' : 'var(--ink-3)',
                                    cursor: 'pointer' }}>
                    {t === 'light' ? '日 light' : '夜 dark'}
                  </button>
                ))}
              </div>
              <div style={{ fontSize: 'var(--text-xs)', color: 'var(--ink-3)', marginTop: 'var(--space-3)', lineHeight: 1.5 }}>
                All three directions share the token system. Switching recolours washi paper + sumi ink together.
              </div>
            </div>
          )}
        </>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
