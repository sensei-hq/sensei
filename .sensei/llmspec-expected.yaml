project: sensei
version: 0.1.0
description: >
  A CLI tool and MCP server that indexes a codebase once, exposes it at four
  resolution levels (signature/description/logic/source), and measures the
  impact of AI skills through A/B benchmarks.

stack:
  - typescript
  - bun
  - vitest
  - modelcontextprotocol

entry_points:
  - path: packages/cli/src/cli.ts
    role: sensei CLI binary — arg parsing, subcommand dispatch
  - path: packages/mcp/src/index.ts
    role: MCP server entry — registers 14 tools over stdio
  - path: packages/server/src/serve.ts
    role: inference HTTP server — /health, /analyze, /setup endpoints
  - path: packages/tools/src/index.ts
    role: tool library barrel — reindex, query, drift, context, project-memory

concepts:
  - name: llmspec
    description: >
      YAML manifest (.sensei/llmspec.yaml) that describes the project to AI agents:
      entry points, tech stack, doc-to-code coverage mappings, patterns, shortcuts.
  - name: resolution levels
    description: >
      Code stored at four granularities — L0 signature (~10 tokens), L1 description,
      L2 logic flow, L3 full source. Agents request the minimum needed.
  - name: symbol map
    description: >
      JSON index (.sensei/symbol-map.json) mapping every exported symbol to its
      file, resolution levels, and relations. Built by reindexRepo().
  - name: doc coverage
    description: >
      Each docs[] entry in llmspec.yaml has a covers[] list mapping the doc to the
      source files it documents. Used by checkDrift() to detect stale docs.
  - name: package split
    description: >
      Monorepo with 5 packages: shared (types) -> tools (logic) -> mcp/server (adapters)
      -> cli (binary). Neither mcp nor cli depends on the other.

patterns:
  - name: injectable deps
    description: >
      Functions accept optional fn parameters (fetchFn, execFn, isAvailableFn) so
      tests can inject stubs without module mocking. Default is the real implementation.
  - name: barrel exports
    description: >
      Each package exposes a single src/index.ts barrel. Internal paths are never
      imported across package boundaries.
  - name: workspace-star deps
    description: >
      Cross-package deps use "workspace:*" protocol. Bun resolves TypeScript source
      directly — no build step needed for workspace consumers.

api_surface:
  - path: packages/tools/src/index.ts
    description: reindexRepo, checkDrift, loadContext, project-memory functions
  - path: packages/server/src/index.ts
    description: createReportServer, serve, checkSystemRequirements
  - path: packages/mcp/src/index.ts
    description: MCP stdio server (not a programmatic API — run as subprocess)

docs:
  - path: docs/design/01-architecture.md
    covers:
      - packages/cli/src/cli.ts
      - packages/mcp/src/index.ts
  - path: docs/design/03-mcp-server.md
    covers:
      - packages/mcp/src/index.ts
      - packages/tools/src/index.ts
  - path: docs/design/04-llmspec.md
    covers:
      - packages/tools/src/tools/reindex.ts
      - packages/tools/src/index-reader.ts
  - path: docs/design/05-indexing.md
    covers:
      - packages/tools/src/tools/reindex.ts
  - path: docs/design/07-drift.md
    covers:
      - packages/tools/src/tools/drift.ts
  - path: docs/design/08-benchmarking.md
    covers:
      - packages/cli/src/commands/benchmark-doctor.ts
      - packages/cli/src/commands/benchmark-inspect.ts
      - packages/cli/src/commands/benchmark-promote.ts
  - path: docs/design/09-cli.md
    covers:
      - packages/cli/src/cli.ts
      - packages/cli/src/commands/init.ts
      - packages/cli/src/commands/add.ts
      - packages/cli/src/commands/status.ts
  - path: docs/design/10-project-memory.md
    covers:
      - packages/tools/src/tools/project-memory.ts
  - path: docs/design/13-traceability-matrix.md
    covers:
      - packages/tools/src/tools/drift.ts
      - packages/tools/src/index-reader.ts
  - path: docs/design/14-server-package.md
    covers:
      - packages/server/src/serve.ts
      - packages/server/src/model/system-check.ts
  - path: docs/features/01-CodebaseIndexing.md
    covers:
      - packages/tools/src/tools/reindex.ts
      - packages/tools/src/index-reader.ts
  - path: docs/features/04-DocDriftDetection.md
    covers:
      - packages/tools/src/tools/drift.ts
  - path: docs/features/06-Benchmarking.md
    covers:
      - packages/cli/src/commands/benchmark-doctor.ts
