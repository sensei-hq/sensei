project: sensei
version: 0.0.0
description: >-
  A CLI and MCP server that indexes a codebase once, exposes exports at four
  resolution levels (L0-L3), and measures AI skills impact through A/B
  benchmarks.
stack:
  - typescript/javascript
entry_points:
  - path: packages/cli/src/cli.ts
    role: sensei CLI binary — arg parsing, subcommand dispatch
concepts:
  - name: llmspec
    definition: >-
      YAML manifest (.sensei/llmspec.yaml) describing the project to AI agents:
      entry points, stack, doc-to-code coverage mappings, patterns, shortcuts.
  - name: resolution levels
    definition: >-
      Code stored at four granularities — L0 signature (~10 tokens), L1
      description, L2 logic flow, L3 full source. Agents request the minimum
      needed.
  - name: symbol map
    definition: >-
      JSON index (.sensei/symbol-map.json) mapping every file to its exported
      symbols at L0-L2, built by reindexRepo().
  - name: doc coverage
    definition: >-
      Each docs[] entry in llmspec.yaml has a covers[] list mapping the doc to
      the source files it documents. Used by checkDrift() to detect stale docs.
  - name: package split
    definition: >-
      Monorepo with 5 packages: shared (types) → tools (logic) → mcp/server
      (adapters) → cli (binary). Neither mcp nor cli depends on the other.
patterns:
  - name: injectable deps
    files: packages/*/src/**/*.ts
    convention: >-
      Functions accept optional fn parameters (fetchFn, execFn, isAvailableFn)
      so tests can inject stubs without module mocking.
  - name: barrel exports
    files: packages/*/src/index.ts
    convention: >-
      Each package exposes a single src/index.ts barrel. Internal paths are
      never imported across package boundaries.
  - name: workspace-star deps
    files: packages/*/package.json
    convention: >-
      Cross-package deps use "workspace:*" protocol. Bun resolves TypeScript
      source directly — no build step needed for workspace consumers.
api_surface: []
doc_layers:
  design: docs/design/
  code: packages/
  public:
    - README.md
